<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
    <link rel="stylesheet" href="lab3style.css">
</head>
<body>
    <h1>American International University-Bangladesh</h1>
    <h2>Lab Task 3</h2>
   <fieldset>
        <legend>Student Information</legend>
        <table>
            <tr>
                <td>Full Name (Text)<br>
                <input type="text" placeholder="Enter your full name" />
                </td>
                <td class="email">Email <br>
                <input type="email" placeholder="your email@example.com" />
                </td>  
            </tr>
            <tr>
                <td>Password<br>
                <input type="password" placeholder="Enter your password" />
                </td>
                <td class="age"> Age (Number)<br>
                <input type="number" placeholder="Enter your age" />
                </td>  
            </tr>
            <tr>
                <td>Experience Date <br>
                <input type="date" />
                </td>
                <td class="phonenumber">Phone Number (Tel)<br>
                <input type="number" placeholder="+880 XXXX XXXXXX" />
                </td>  
            </tr>
        </table>
    </fieldset>
    <div id="parent">
    <button id="child1">SUBMIT</button>
    <button id="child2">CLEAR</button>
</div>
     
</body>
</html>
